name: ci

on:
  push:
  pull_request:

jobs:
  # Python implementation across all three OSes (stdlib-only, no install step).
  python:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.8", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite
        run: python -m unittest discover -s tests -v

  # Bash implementation + the JSON parity gate (Unix only).
  bash-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install jq (for --sonar paths)
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Syntax check
        run: bash -n repodash
      - name: Parity gate (python vs bash --json)
        run: bash tests/test_parity.sh
      - name: Full suite (includes bash render/JSON/ERE parity)
        run: python -m unittest discover -s tests -v
